name: CI

# Far Horizon CI. Two complementary jobs:
#
#   structure  — GitHub-hosted ubuntu, NO Unity license. Repo-hygiene + asmdef +
#                entry-point-method gate. Runs on EVERY push/PR and is the
#                required status check that protects `main` today (zero Unity
#                licensing dependency).
#
#   unity      — SELF-HOSTED Windows runner with the exact installed editor
#                (6000.4.11f1, already licensed on this machine — no UNITY_LICENSE
#                secret, no billed private-repo minutes). The RELIABLE MERGE GATE.
#                Chains BootstrapProject.Run -> EditMode -> BuildWindows ->
#                shipped-build capture gate, parses the NUnit XML result line (exit
#                codes lie — see unity-conventions.md), and uploads test XMLs +
#                logs + build BEFORE the workspace is cleaned (.gitignore eats them).
#                PlayMode is intentionally NOT in this job (see `playmode` below).
#
#   playmode   — SELF-HOSTED, ADVISORY + non-required + fail-fast. Runs the PlayMode
#                suite for SIGNAL but can NEVER block a merge: `continue-on-error:
#                true` at the JOB level + a hard `timeout-minutes` cap so a future
#                play-mode-ENTER env-deadlock fails FAST + NAMED instead of hanging
#                to the 90-min cap and crashing the runner. `needs: unity` serializes
#                it AFTER the merge-gate Unity build so the two never contend the
#                single self-hosted runner's PackageCache (EPERM —
#                [[single-unity-build-slot-serializes-orchestration]]). The
#                play-mode-enter deadlock is environmental + fixture-presence-
#                triggered; re-fold PlayMode into the blocking gate once the root
#                cause is fixed. See unity-conventions.md §CI architecture. (86caapwmt)
#
# Route rationale (see PR body): the game-ci docker route is blocked twice over
# on this repo — (1) no unityci/editor image exists yet for the 6000.4.x stream
# with the Windows IL2CPP module, (2) it needs a Sponsor-supplied UNITY_LICENSE
# secret AND bills minutes on a PRIVATE repo. The self-hosted runner sidesteps
# all three: exact-version match, existing local license, zero billed minutes.

on:
  push:
    branches: [main]
    # Docs-only changes skip the WHOLE CI (incl. the heavy self-hosted unity build).
    # Every push/PR triggers a full unity build on the SINGLE far-horizon-local
    # runner; a docs-only change needlessly contends the runner and is a known EPERM
    # trigger when it races another build (unity-conventions.md §Process notes,
    # ticket 86caahtbe). The structure job is fast/hosted but has nothing to check on
    # a pure-docs change. NOTE: a paths-ignore filter makes the run not trigger at all
    # — it does NOT report a skipped *required* check as success. `unity` is NOT a
    # required branch-protection check today (the hosted `structure` job is the one
    # protecting main — see job comments). If `unity` is ever promoted to required,
    # replace this filter with a path-FILTER job that emits a green no-op (see PR body).
    paths-ignore:
      - '**/*.md'
      - 'team/**'
      - 'inspiration/**'
      - '.claude/**'
      - 'docs/**'
  pull_request:
    branches: [main]
    paths-ignore:
      - '**/*.md'
      - 'team/**'
      - 'inspiration/**'
      - '.claude/**'
      - 'docs/**'

# Cancel superseded runs on the same ref to save self-hosted runner time.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  # ---------------------------------------------------------------------------
  # License-free gate. This is the one that protects main RIGHT NOW.
  # ---------------------------------------------------------------------------
  structure:
    name: structure (hosted, no license)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # structure_check.sh uses git ls-files across history
      - name: Run structure check
        run: |
          chmod +x .github/workflows/scripts/structure_check.sh
          .github/workflows/scripts/structure_check.sh

      # The gate scripts are tested too (the bar applies to itself). Zero Unity
      # dependency, so it runs in the license-free job on every PR: console-error
      # gate nit fixes + the capture gate's black/empty/uniform/magenta/zero-frame
      # cases on a tmp tree.
      - name: Gate-script unit tests
        run: |
          chmod +x tests/scripts/test_gate_scripts.sh
          tests/scripts/test_gate_scripts.sh

  # ---------------------------------------------------------------------------
  # Unity gate — self-hosted Windows runner. Skips cleanly (does not fail the
  # PR) until a runner with the `unity` + `windows` labels is registered and
  # online; once it is, this becomes a required check too (see PR body for the
  # branch-protection coordination with U2).
  # ---------------------------------------------------------------------------
  unity:
    name: unity (self-hosted, EditMode + build + capture)
    runs-on: [self-hosted, windows, unity]
    # A COLD / post-cache-clear build does a full package re-resolve + asset reimport
    # (no warm Library) and was observed at 20–25+ min — the old 40-min cap auto-
    # CANCELLED a churning cold build (run 27692339123, ticket 86caahtbe). A 55-min
    # cap still kept auto-cancelling cold builds mid-PlayMode, so no run ever greened
    # to populate the cache (deadlock). 90 min lets ONE cold build fully complete + go
    # green + fully warm Library/; thereafter clean:false keeps every run warm (~7–9
    # min, well under any timeout) while still bounding a genuinely hung runner.
    timeout-minutes: 90
    env:
      UNITY: 'C:\Program Files\Unity\Hub\Editor\6000.4.11f1\Editor\Unity.exe'
      RESULTS: ${{ github.workspace }}\ci-out
    steps:
      # clean: false keeps the gitignored Library/ between runs. The default
      # clean: true runs `git clean -ffdx` and WIPES Library/ every run, forcing
      # a full cold package re-resolve + asset reimport (20–50 min) on EVERY CI
      # build — never the ~7–9 min warm path (ticket 86caahtbe root cause). With
      # the cache persisted, only the first build after a checkout cleanup is cold.
      - uses: actions/checkout@v4
        with:
          clean: false

      - name: Prepare output dir
        shell: bash
        run: mkdir -p ci-out

      # 0. PackageCache hygiene — delete stranded Library/PackageCache/.tmp-* staging
      #    dirs BEFORE bootstrap. The resolver renames a fresh .tmp-* onto a target
      #    dir; a stranded/locked target (left by a concurrent/cancelled build) makes
      #    that rename EPERM (com.unity.shadergraph / com.unity.modules.terrainphysics
      #    observed — unity-conventions.md §Headless, ticket 86caahtbe). Idempotent +
      #    no-op on a warm cache; never fails the build (bootstrap is the gate).
      - name: Clean stranded PackageCache .tmp dirs
        shell: bash
        run: |
          chmod +x .github/workflows/scripts/clean_packagecache_tmp.sh
          .github/workflows/scripts/clean_packagecache_tmp.sh

      # 1. Bootstrap — establish URP + boot scene + build stamp from code, exactly
      #    as U1 did. Idempotent; safe to re-run on a fresh CI checkout.
      #    Wrapped in bootstrap_with_retry.sh: the PackageCache EPERM-on-rename is NOT
      #    only a PRE-stranded .tmp problem — the resolver creates a .tmp DURING the
      #    run and its rename onto the (even cold) target can be blocked by a lingering
      #    handle from a just-cancelled Unity resolver / an AV-indexer (proven on run
      #    27699769706: cold runner, no concurrent build, still EPERM'd on
      #    com.unity.test-framework.performance). The wrapper retries ONLY on the
      #    EPERM-rename signature — deleting the regenerable PackageCache + settling
      #    between tries; any OTHER failure (compile/real error) fails fast, no retry.
      - name: Bootstrap project (BootstrapProject.Run)
        shell: bash
        run: |
          chmod +x .github/workflows/scripts/bootstrap_with_retry.sh
          # Relative log path (cwd = workspace root) to avoid the $RESULTS backslash
          # under Git-bash; the later gate steps already read ci-out/bootstrap.log.
          .github/workflows/scripts/bootstrap_with_retry.sh \
            "$UNITY" "$GITHUB_WORKSPACE" "ci-out/bootstrap.log"

      # 2. EditMode tests. NO -quit with -runTests (unity-conventions.md). The
      #    runner's exit code is advisory; the XML parser is the real gate.
      - name: EditMode tests
        shell: cmd
        run: >
          "%UNITY%" -batchmode -nographics
          -projectPath "%GITHUB_WORKSPACE%"
          -runTests -testPlatform EditMode
          -testResults "%RESULTS%\test-results-editmode.xml"
          -logFile "%RESULTS%\editmode.log"
        continue-on-error: true

      # 3. PlayMode tests run in a SEPARATE, advisory, fail-fast `playmode` job
      #    (see below) — NOT here. The merge-gate `unity` job is EditMode + build +
      #    capture ONLY (the three reliable gates). Rationale: this self-hosted
      #    runner has a CONFIRMED play-mode-ENTER env-deadlock (Unity freezes
      #    "Entering Playmode" and never self-quits; the hung headless Unity IGNORES
      #    the GH step-cancel, so it pins the runner until it LOSES COMMUNICATION
      #    with the server — an INFRASTRUCTURE failure `continue-on-error` cannot
      #    suppress). Proven on run 27769261766: an in-line PlayMode step killed the
      #    whole unity job (Build + capture never ran). Moving PlayMode to its own
      #    non-required job means it can NEVER block a merge again, while still
      #    running for signal. See unity-conventions.md §CI architecture +
      #    [[sponsor-quarantines-env-blocked-tests]]. Tracked: 86caapwmt.

      # 4. Windows standalone build. FarHorizonBuilder exits non-zero on a failed
      #    build, so this step's exit code IS authoritative for the build.
      - name: Windows build (FarHorizonBuilder.BuildWindows)
        shell: cmd
        run: >
          "%UNITY%" -batchmode -quit -nographics
          -projectPath "%GITHUB_WORKSPACE%"
          -executeMethod FarHorizon.EditorTools.FarHorizonBuilder.BuildWindows
          -logFile "%RESULTS%\build.log"

      # 5. Upload EVERYTHING before any cleanup — .gitignore eats *.log /
      #    test-results*.xml / Build/, so artifacts are the only way they survive.
      - name: Upload test results + logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unity-ci-logs-${{ github.sha }}
          path: |
            ci-out/*.xml
            ci-out/*.log
          if-no-files-found: warn
          retention-days: 14

      - name: Upload Windows build
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: FarHorizon-Windows-${{ github.sha }}
          path: Build/Windows/**
          if-no-files-found: warn
          retention-days: 14

      # 6. Authoritative gates — run AFTER upload so evidence is preserved even
      #    when a gate fails. The XML parser and the log scanner (with the URP
      #    first-import warning allowlist) decide pass/fail, not the runner exit
      #    codes from steps 2/3.
      - name: Console-error gate (URP first-import warnings allowlisted)
        if: always()
        shell: bash
        run: |
          chmod +x .github/workflows/scripts/check_unity_log.sh
          .github/workflows/scripts/check_unity_log.sh \
            ci-out/bootstrap.log ci-out/editmode.log ci-out/build.log

      - name: EditMode result gate
        if: always()
        shell: bash
        run: python3 .github/workflows/scripts/parse_test_results.py ci-out/test-results-editmode.xml EditMode

      # NOTE: PlayMode result gating lives in the separate advisory `playmode` job
      # below — it is NOT part of this merge-gate job. (86caapwmt)

      - name: Build-result gate
        if: always()
        shell: bash
        run: |
          if grep -qE '\[FarHorizonBuilder\] result=Succeeded' ci-out/build.log; then
            grep -E '\[FarHorizonBuilder\] result=' ci-out/build.log
            echo "[build-gate] PASSED"
          else
            echo "[build-gate] FAILED — no 'result=Succeeded' line in build.log" >&2
            grep -E '\[FarHorizonBuilder\]' ci-out/build.log || true
            exit 1
          fi

      # 7. Shipped-build capture gate (ticket 86ca86g7k) — the editor-vs-runtime
      #    backstop. Launches the BUILT exe WINDOWED (NOT -batchmode: ScreenCapture
      #    needs a real swapchain, spike iter-4 / unity-conventions.md), drives the
      #    standard CaptureGate component for N frames, then frame_check.py FAILS on
      #    black/empty/uniform/magenta frames. Runs only when the build produced an
      #    exe; the frames upload AFTER (if: always()) so evidence survives a fail.
      - name: Shipped-build capture gate (frame content)
        if: always()
        shell: bash
        run: |
          if [ -f Build/Windows/FarHorizon.exe ]; then
            chmod +x .github/workflows/scripts/capture_gate.sh
            .github/workflows/scripts/capture_gate.sh \
              Build/Windows/FarHorizon.exe ci-out/caps 4
          else
            echo "[capture-gate] no exe at Build/Windows/FarHorizon.exe — build produced no binary" >&2
            exit 1
          fi

      - name: Upload capture frames
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: FarHorizon-captures-${{ github.sha }}
          path: ci-out/caps/*.png
          if-no-files-found: warn
          retention-days: 14

      # 8. Settings-panel shipped-build capture gate (ticket 86caa4bqp) — the
      #    panel-specific sibling of step 7. The generic -captureGate renders a
      #    closed-world gameplay frame with NO panel, so it can never satisfy the
      #    settings success-test ("panel OPENS + a tweak TAKES EFFECT LIVE" — Tess
      #    QA bounce on PR #83). This launches the SAME built exe windowed with
      #    -verifySettings, driving SettingsVerifyCapture to open the panel + drag
      #    the walk-speed slider to max. It then asserts BOTH: (a) frame_check.py on
      #    settings_{closed,open,tweaked}.png (the panel really rendered in the
      #    shipped player), and (b) the player log carries `changedLive=True` (the
      #    live param actually changed — the end-to-end "tweak takes effect" proof).
      #    Runs only when the build produced an exe; frames + log upload AFTER
      #    (if: always()) so the panel evidence survives a fail.
      - name: Settings-panel capture gate (panel opens + live tweak)
        if: always()
        shell: bash
        run: |
          if [ -f Build/Windows/FarHorizon.exe ]; then
            chmod +x .github/workflows/scripts/verify_settings_gate.sh
            .github/workflows/scripts/verify_settings_gate.sh \
              Build/Windows/FarHorizon.exe ci-out/settings-caps ci-out/verify-settings.log
          else
            echo "[verify-settings] no exe at Build/Windows/FarHorizon.exe — build produced no binary" >&2
            exit 1
          fi

      - name: Upload settings-panel frames + log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: FarHorizon-settings-caps-${{ github.sha }}
          path: |
            ci-out/settings-caps/*.png
            ci-out/verify-settings.log
          if-no-files-found: warn
          retention-days: 14

  # ---------------------------------------------------------------------------
  # PlayMode gate — ADVISORY, NON-REQUIRED, FAIL-FAST. Runs the PlayMode suite for
  # signal, but can NEVER block a merge:
  #   * `continue-on-error: true` at the JOB level → a failed/timed-out PlayMode
  #     run reports the job result as a (neutral) non-failure to the workflow, so
  #     branch protection (which gates on `structure` + the `unity` merge-gate job)
  #     is unaffected. Do NOT add this job's check to required status checks.
  #   * `timeout-minutes: 20` is a HARD cap: a FUTURE play-mode-ENTER env-deadlock
  #     fails FAST + NAMED (this job goes red, clearly attributable to PlayMode)
  #     instead of hanging to the 90-min job cap and crashing the runner. The cap
  #     covers a cold warm-up (checkout/bootstrap) + the PlayMode run; tune up if a
  #     legitimately green PlayMode run ever approaches it.
  #   * `needs: unity` SERIALIZES this AFTER the merge-gate Unity build so the two
  #     Unity invocations never contend the single self-hosted runner's PackageCache
  #     (EPERM-on-rename — [[single-unity-build-slot-serializes-orchestration]] +
  #     unity-conventions.md §Process notes). `if: always()` lets PlayMode run for
  #     signal even when the merge-gate job failed.
  #
  # The play-mode-ENTER deadlock is ENVIRONMENTAL + fixture-presence-triggered (it
  # fires before any single fixture runs; EditMode is unaffected; the same PlayMode
  # pattern passed on green main run 27685445841). When the root cause is fixed,
  # re-fold PlayMode into the blocking `unity` gate + drop this job.
  # Re-enable-blocking follow-up: ticket 86cab7u42 (this PR: 86caapwmt).
  # ---------------------------------------------------------------------------
  playmode:
    name: playmode (self-hosted, advisory — non-blocking)
    runs-on: [self-hosted, windows, unity]
    needs: unity
    if: always()
    continue-on-error: true   # ADVISORY — PlayMode can NEVER block a merge (86caapwmt)
    timeout-minutes: 20       # HARD fail-fast cap: a play-mode-enter deadlock fails FAST + NAMED
    env:
      UNITY: 'C:\Program Files\Unity\Hub\Editor\6000.4.11f1\Editor\Unity.exe'
      RESULTS: ${{ github.workspace }}\ci-out
    steps:
      - uses: actions/checkout@v4
        with:
          clean: false

      - name: Prepare output dir
        shell: bash
        run: mkdir -p ci-out

      - name: Clean stranded PackageCache .tmp dirs
        shell: bash
        run: |
          chmod +x .github/workflows/scripts/clean_packagecache_tmp.sh
          .github/workflows/scripts/clean_packagecache_tmp.sh

      - name: Bootstrap project (BootstrapProject.Run)
        shell: bash
        run: |
          chmod +x .github/workflows/scripts/bootstrap_with_retry.sh
          .github/workflows/scripts/bootstrap_with_retry.sh \
            "$UNITY" "$GITHUB_WORKSPACE" "ci-out/bootstrap.log"

      # PlayMode tests. NO -quit with -runTests (unity-conventions.md). Headless:
      # Time.deltaTime~0 per frame — the suite samples over a Time.time window. If
      # the play-mode-ENTER env-deadlock fires, the job's timeout-minutes cap kills
      # it FAST + NAMED rather than hanging the pipeline.
      - name: PlayMode tests
        shell: cmd
        run: >
          "%UNITY%" -batchmode -nographics
          -projectPath "%GITHUB_WORKSPACE%"
          -runTests -testPlatform PlayMode
          -testResults "%RESULTS%\test-results-playmode.xml"
          -logFile "%RESULTS%\playmode.log"
        continue-on-error: true

      - name: Upload PlayMode results + log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: FarHorizon-playmode-${{ github.sha }}
          path: |
            ci-out/test-results-playmode.xml
            ci-out/playmode.log
          if-no-files-found: warn
          retention-days: 14

      # Advisory result gate — reports PlayMode pass/fail for SIGNAL. The job-level
      # continue-on-error keeps a red here from ever blocking a merge.
      - name: PlayMode result gate (advisory)
        if: always()
        shell: bash
        run: |
          if [ ! -f ci-out/test-results-playmode.xml ]; then
            echo "[PlayMode] no result XML — PlayMode likely hung on play-mode-ENTER (env-deadlock) and was killed by the job timeout. ADVISORY only; does not block merge. Tracked: 86caapwmt." >&2
            exit 1
          fi
          python3 .github/workflows/scripts/parse_test_results.py ci-out/test-results-playmode.xml PlayMode

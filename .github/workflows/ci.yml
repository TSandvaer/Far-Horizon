name: CI

# Far Horizon CI. Four complementary jobs:
#
#   structure  — GitHub-hosted ubuntu, NO Unity license. Repo-hygiene + asmdef +
#                entry-point-method gate. Runs on EVERY push/PR and is the
#                required status check that protects `main` today (zero Unity
#                licensing dependency).
#
#   build      — SELF-HOSTED Windows runner (ANY: [self-hosted, windows, unity]).
#                The HEADLESS, 2nd-runner-SAFE half of the old `unity` job: chains
#                BootstrapProject.Run -> EditMode -> BuildWindows(IL2CPP) -> the
#                console-error / EditMode-result / build-result gates. Parses the
#                NUnit XML result line (exit codes lie — see unity-conventions.md)
#                and uploads test XMLs + logs + build BEFORE the workspace is cleaned
#                (.gitignore eats them). Uploads FarHorizon-Windows-${{ github.sha }}
#                so the `capture` job can pull the exe on a DIFFERENT runner. A 2nd
#                runner CAN pick this job up because it is fully headless (no windowed
#                swapchain) and relies on each runner's OWN isolated cache (see
#                cache-isolation note below). PlayMode is NOT here (see `playmode`).
#
#   capture    — SELF-HOSTED Windows runner PINNED to runner-1 via the EXTRA `capture`
#                label ([self-hosted, windows, unity, capture]). The WINDOWED-CAPTURE
#                half of the old `unity` job: downloads the build artifact, then runs
#                the shipped-build capture gates (generic spawn + settings + pond +
#                loot + water + chop). `needs: build`. WHY PINNED + SERIAL: the
#                windowed captures BREAK when a 2nd Unity build runs concurrently on
#                this machine (A/B-CONFIRMED 2026-06-29: 4/4 clean single-runner vs
#                3/3 flaked with runner-2 online — the D3D12 first-frame present loop
#                wedges under contention). `concurrency: group: unity-capture` (no ref)
#                guarantees at most ONE capture job EVER across the whole repo — the
#                A/B-proven safety pin. Build+EditMode (the `build` job) can parallelize
#                across both runners; captures stay strictly serial here. (86cafz9tg)
#
#   playmode   — SELF-HOSTED, ADVISORY + non-required + fail-fast. Runs the PlayMode
#                suite for SIGNAL but can NEVER block a merge: `continue-on-error:
#                true` at the JOB level + a hard `timeout-minutes` cap so a future
#                play-mode-ENTER env-deadlock fails FAST + NAMED instead of hanging
#                to the 90-min cap and crashing the runner. `needs: build` (was
#                `needs: unity` pre-86cafz9tg) serializes it AFTER the build so the two
#                Unity invocations never contend the SAME runner's PackageCache (EPERM —
#                [[single-unity-build-slot-serializes-orchestration]]). The
#                play-mode-enter deadlock is environmental + fixture-presence-
#                triggered; re-fold PlayMode into the blocking gate once the root
#                cause is fixed. See unity-conventions.md §CI architecture. (86caapwmt)
#
# REQUIRED-CHECK / BRANCH-PROTECTION NOTE (86cafz9tg — SPONSOR ACTION REQUIRED):
#   The old single `unity` job is split into `build` + `capture`. Branch-protection
#   required status checks must change `structure` + `unity` → `structure` + `build`
#   + `capture` so the shipped-build capture gate stays REQUIRED (a hard rule). This
#   is a repo-settings change the Sponsor makes in the GitHub UI; it cannot be done
#   from this YAML. Until updated, `unity` no longer exists as a check name.
#
# RUNNER `capture` LABEL NOTE (86cafz9tg — SPONSOR ACTION REQUIRED):
#   This YAML targets the EXTRA `capture` label on runner-1 to pin all windowed
#   captures to that single runner. Add the label to runner-1 (e.g. re-run
#   `config.cmd --labels self-hosted,windows,unity,capture --replace`, or via the
#   runner's GitHub Settings → Runners → Labels). Runner-2 must NOT get the `capture`
#   label so capture jobs never land on it. Until runner-1 has the label, the
#   `capture` job will queue with no eligible runner (it does not silently skip).
#
# CACHE-ISOLATION ASSUMPTION (86cafz9tg / 86cabkhjg / second-runner-setup-steps.md):
#   The `build` job relies on EACH RUNNER's OWN isolated package cache. Runner-2 is
#   already isolated per second-runner-setup-steps.md: separate `--work` checkout root
#   (so Library/PackageCache is physically distinct) PLUS `.env`-pinned
#   UPM_CACHE_ROOT=C:\upm-cache-2 + BEE_CACHE_DIRECTORY=C:\bee-cache-2 (so the global
#   UPM + Bee IL2CPP caches don't race). This is what makes two concurrent headless
#   builds safe WITHOUT re-introducing the PackageCache EPERM the single-slot rule was
#   protecting against. This split does NOT add per-workspace cache env vars to the
#   build job (the runner-level `.env` + `--work` isolation already covers it); the
#   optional workspace-relative pinning in second-runner-setup-steps.md §2 stays a
#   follow-up. The capture job runs no Unity build, so it has no cache contention of
#   its own — its only safety requirement is the serial `unity-capture` pin above.
#
# Route rationale (see PR body): the game-ci docker route is blocked twice over
# on this repo — (1) no unityci/editor image exists yet for the 6000.4.x stream
# with the Windows IL2CPP module, (2) it needs a Sponsor-supplied UNITY_LICENSE
# secret AND bills minutes on a PRIVATE repo. The self-hosted runner sidesteps
# all three: exact-version match, existing local license, zero billed minutes.

on:
  push:
    branches: [main]
    # Docs-only changes skip the WHOLE CI (incl. the heavy self-hosted unity build).
    # Every push/PR triggers a full unity build on the SINGLE far-horizon-local
    # runner; a docs-only change needlessly contends the runner and is a known EPERM
    # trigger when it races another build (unity-conventions.md §Process notes,
    # ticket 86caahtbe). The structure job is fast/hosted but has nothing to check on
    # a pure-docs change. NOTE: a paths-ignore filter makes the run not trigger at all
    # — it does NOT report a skipped *required* check as success. Once the Sponsor
    # promotes `build` + `capture` to required branch-protection checks (86cafz9tg),
    # this paths-ignore must be replaced with a path-FILTER job that emits a green
    # no-op for those checks on a docs-only change, or docs-only PRs will hang on a
    # never-reported required check (see PR body). Today the hosted `structure` job is
    # the one protecting main — see job comments.
    paths-ignore:
      - '**/*.md'
      - 'team/**'
      - 'inspiration/**'
      - '.claude/**'
      - 'docs/**'
  pull_request:
    branches: [main]
    paths-ignore:
      - '**/*.md'
      - 'team/**'
      - 'inspiration/**'
      - '.claude/**'
      - 'docs/**'

# TOP-LEVEL group is the SAME-REF SUPERSEDE mechanism — LEAVE ref-scoped.
# `ci-${{ github.ref }}` + cancel-in-progress: true cancels a PR's OWN prior WHOLE
# run (build + capture + playmode) on a re-push to the SAME ref, saving self-hosted
# runner time and preventing N stale same-ref builds stacking in the repo-wide
# `unity-build` queue below. Do NOT make this repo-wide: this level holds NO runner
# (only the self-hosted JOBS do), so making it a fixed group cannot fix the
# orphan-hold (86caammpq) — that is fixed at the runner-contending JOB level
# (`unity-build` / `unity-capture` repo-wide queues) — and a fixed top-level group
# with cancel-in-progress would DROP a concurrent PR's whole run (rejected per
# 86cah17eq: contending runs must QUEUE, not cancel). The CROSS-REF orphan-hold is
# a JOB-level concern; same-ref supersede is this TOP-level concern. (86caammpq)
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  # ---------------------------------------------------------------------------
  # License-free gate. This is the one that protects main RIGHT NOW.
  # ---------------------------------------------------------------------------
  structure:
    name: structure (hosted, no license)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # structure_check.sh uses git ls-files across history
      - name: Run structure check
        run: |
          chmod +x .github/workflows/scripts/structure_check.sh
          .github/workflows/scripts/structure_check.sh

      # The gate scripts are tested too (the bar applies to itself). Zero Unity
      # dependency, so it runs in the license-free job on every PR: console-error
      # gate nit fixes + the capture gate's black/empty/uniform/magenta/zero-frame
      # cases on a tmp tree.
      - name: Gate-script unit tests
        run: |
          chmod +x tests/scripts/test_gate_scripts.sh
          tests/scripts/test_gate_scripts.sh

      # The destructive-bash deny-hook protects every persona/orch session; its
      # field-scoping behavior (ticket 86cabe3gx) is regression-guarded here.
      - name: Destructive-bash hook unit tests
        run: |
          chmod +x tests/scripts/test_block_destructive_hook.sh
          tests/scripts/test_block_destructive_hook.sh

      # The orchestrator anti-idle Stop hook (both fire branches: full-idle +
      # stale-scan) + the SessionStart resume-nudge are regression-guarded here.
      # Zero Unity dependency — JSONL transcript fixtures fed on a tmp tree.
      - name: Anti-idle hook unit tests
        run: |
          chmod +x tests/scripts/test_anti_idle_hook.sh
          tests/scripts/test_anti_idle_hook.sh

  # ---------------------------------------------------------------------------
  # Build gate — self-hosted Windows runner, HEADLESS half (2nd-runner-SAFE).
  # ANY [self-hosted, windows, unity] runner can pick this up. Bootstrap ->
  # EditMode -> BuildWindows(IL2CPP) -> console-error / EditMode-result /
  # build-result gates. Uploads FarHorizon-Windows-${{ github.sha }} so the
  # capture job can pull the exe on a DIFFERENT runner. Split from the old
  # monolithic `unity` job in 86cafz9tg so the build/EditMode lane parallelizes
  # across two runners while captures stay pinned + serial (see `capture` below).
  #
  # concurrency: a REPO-WIDE QUEUE (`unity-build`, NO ref suffix,
  # cancel-in-progress: false) — the 86caammpq orphan-hold fix. WHY not ref-scoped:
  # a ref-scoped `unity-build-${{ github.ref }}` group could not stop a MERGED /
  # SUPERSEDED branch's build from orphan-HOLDING the single self-hosted runner
  # while a HEAD (main-merge or newer-PR) build waited — the merge-to-main run is
  # on `refs/heads/main` (a DIFFERENT ref → different group), so it never
  # serialized behind, and the orphan held the runner until its 90-min timeout or
  # a manual `gh run cancel` (the exact operational band-aid this ticket removes;
  # verified 2026-07-01: crouch #197 + devconsole #208 capture jobs were BOTH
  # `gh run cancel`-cancelled at 08:55:31 — neither had acquired a runner — because
  # the orphan-hold forced a manual cancel). An ABSOLUTE `unity-build` group +
  # cancel-in-progress: false makes ALL build jobs across ALL refs serialize into
  # ONE bounded queue on the single runner (build is ~7-9 min warm; the 90-min
  # ORPHAN-HOLD-to-timeout class is gone), and NO build verdict is ever DROPPED
  # (queue, not cancel — matches the `unity-capture` group's queue semantics, so a
  # HEAD build waits at most ~one build cycle behind a superseded/merged-branch
  # build instead of colliding or being orphan-held). SAME-REF SUPERSEDE is
  # UNCHANGED and still handled by the TOP-LEVEL `ci-${{ github.ref }}` +
  # cancel-in-progress: true group (a re-push to the SAME PR cancels that PR's
  # WHOLE prior run — build + capture + playmode — regardless of this job-level
  # group), so this repo-wide queue does NOT stack N stale same-ref builds: only
  # DISTINCT-ref builds ever coexist in the queue. This groups the build lane into
  # the same repo-wide serialization domain the `unity-capture` group already gives
  # {capture, playmode} — the whole single-runner-contending set is now queue-mode,
  # never cross-ref cancel (which would DROP a concurrent PR's verdict — rejected
  # per 86cah17eq's destination: contending captures/builds must QUEUE, both
  # produce a verdict). FOLD: this fix subsumes 86cah17eq's build-side contention;
  # the capture-side was already correct (`unity-capture` queue). (86caammpq)
  # ---------------------------------------------------------------------------
  build:
    name: build (self-hosted, EditMode + build)
    runs-on: [self-hosted, windows, unity]
    concurrency:
      group: unity-build
      cancel-in-progress: false
    # A COLD / post-cache-clear build does a full package re-resolve + asset reimport
    # (no warm Library) and was observed at 20–25+ min — the old 40-min cap auto-
    # CANCELLED a churning cold build (run 27692339123, ticket 86caahtbe). A 55-min
    # cap still kept auto-cancelling cold builds mid-PlayMode, so no run ever greened
    # to populate the cache (deadlock). 90 min lets ONE cold build fully complete + go
    # green + fully warm Library/; thereafter clean:false keeps every run warm (~7–9
    # min, well under any timeout) while still bounding a genuinely hung runner.
    timeout-minutes: 90
    env:
      UNITY: 'C:\Program Files\Unity\Hub\Editor\6000.4.11f1\Editor\Unity.exe'
      RESULTS: ${{ github.workspace }}\ci-out
    steps:
      # clean: false keeps the gitignored Library/ between runs. The default
      # clean: true runs `git clean -ffdx` and WIPES Library/ every run, forcing
      # a full cold package re-resolve + asset reimport (20–50 min) on EVERY CI
      # build — never the ~7–9 min warm path (ticket 86caahtbe root cause). With
      # the cache persisted, only the first build after a checkout cleanup is cold.
      - uses: actions/checkout@v4
        with:
          clean: false

      - name: Prepare output dir
        shell: bash
        run: mkdir -p ci-out

      # 0a. STALE-EVIDENCE hygiene (ticket 86cadj4g7 #130 ROUND 6 — the false-green Tess
      #     caught). With clean:false the gitignored ci-out/ persists between runs, so a
      #     PRIOR run's logs linger on the warm runner. The "Upload test results + logs"
      #     step (step 5) runs RIGHT AFTER the build but BEFORE the build-job gate steps —
      #     so a stale log from a previous run could be read as THIS PR's output. Deleting
      #     last run's logs at job START makes every uploaded artifact reflect ONLY this
      #     run: a missing log now means the gate genuinely didn't write it, not a stale
      #     carry-over. Idempotent; the gate scripts also rm their own log, but that's too
      #     late for the step-5 upload. SCOPED to what the BUILD job produces — the
      #     verify-*/capture-dir hygiene lives in the `capture` job's own clean step
      #     (86cafz9tg split moved the windowed gates there; the build job no longer
      #     writes verify-pond.log / *-caps). The build job runs no PlayMode either, so
      #     playmode.log is the `playmode` job's to clean.
      - name: Clean stale gate outputs (prevent stale-log false-green)
        shell: bash
        run: |
          rm -f ci-out/editmode.log ci-out/build.log ci-out/bootstrap.log
          rm -f ci-out/*.xml

      # 0b. PackageCache hygiene — delete stranded Library/PackageCache/.tmp-* staging
      #    dirs BEFORE bootstrap. The resolver renames a fresh .tmp-* onto a target
      #    dir; a stranded/locked target (left by a concurrent/cancelled build) makes
      #    that rename EPERM (com.unity.shadergraph / com.unity.modules.terrainphysics
      #    observed — unity-conventions.md §Headless, ticket 86caahtbe). Idempotent +
      #    no-op on a warm cache; never fails the build (bootstrap is the gate).
      - name: Clean stranded PackageCache .tmp dirs
        shell: bash
        run: |
          chmod +x .github/workflows/scripts/clean_packagecache_tmp.sh
          .github/workflows/scripts/clean_packagecache_tmp.sh

      # 1. Bootstrap — establish URP + boot scene + build stamp from code, exactly
      #    as U1 did. Idempotent; safe to re-run on a fresh CI checkout.
      #    Wrapped in bootstrap_with_retry.sh: the PackageCache EPERM-on-rename is NOT
      #    only a PRE-stranded .tmp problem — the resolver creates a .tmp DURING the
      #    run and its rename onto the (even cold) target can be blocked by a lingering
      #    handle from a just-cancelled Unity resolver / an AV-indexer (proven on run
      #    27699769706: cold runner, no concurrent build, still EPERM'd on
      #    com.unity.test-framework.performance). The wrapper retries ONLY on the
      #    EPERM-rename signature — deleting the regenerable PackageCache + settling
      #    between tries; any OTHER failure (compile/real error) fails fast, no retry.
      - name: Bootstrap project (BootstrapProject.Run)
        shell: bash
        run: |
          chmod +x .github/workflows/scripts/bootstrap_with_retry.sh
          # Relative log path (cwd = workspace root) to avoid the $RESULTS backslash
          # under Git-bash; the later gate steps already read ci-out/bootstrap.log.
          .github/workflows/scripts/bootstrap_with_retry.sh \
            "$UNITY" "$GITHUB_WORKSPACE" "ci-out/bootstrap.log"

      # 2. EditMode tests. NO -quit with -runTests (unity-conventions.md). The
      #    runner's exit code is advisory; the XML parser is the real gate.
      - name: EditMode tests
        shell: cmd
        run: >
          "%UNITY%" -batchmode -nographics
          -projectPath "%GITHUB_WORKSPACE%"
          -runTests -testPlatform EditMode
          -testResults "%RESULTS%\test-results-editmode.xml"
          -logFile "%RESULTS%\editmode.log"
        continue-on-error: true

      # 3. PlayMode tests run in a SEPARATE, advisory, fail-fast `playmode` job
      #    (see below) — NOT here. This `build` job is bootstrap + EditMode + build
      #    ONLY; the windowed captures live in the `capture` job (split in 86cafz9tg).
      #    Together they are the reliable merge gates. Rationale: this self-hosted
      #    runner has a CONFIRMED play-mode-ENTER env-deadlock (Unity freezes
      #    "Entering Playmode" and never self-quits; the hung headless Unity IGNORES
      #    the GH step-cancel, so it pins the runner until it LOSES COMMUNICATION
      #    with the server — an INFRASTRUCTURE failure `continue-on-error` cannot
      #    suppress). Proven on run 27769261766: an in-line PlayMode step killed the
      #    whole unity job (Build + capture never ran). Moving PlayMode to its own
      #    non-required job means it can NEVER block a merge again, while still
      #    running for signal. See unity-conventions.md §CI architecture +
      #    [[sponsor-quarantines-env-blocked-tests]]. Tracked: 86caapwmt.

      # 4. Windows standalone build. FarHorizonBuilder exits non-zero on a failed
      #    build, so this step's exit code IS authoritative for the build.
      - name: Windows build (FarHorizonBuilder.BuildWindows)
        shell: cmd
        run: >
          "%UNITY%" -batchmode -quit -nographics
          -projectPath "%GITHUB_WORKSPACE%"
          -executeMethod FarHorizon.EditorTools.FarHorizonBuilder.BuildWindows
          -logFile "%RESULTS%\build.log"

      # 5. Upload the PRE-GATE logs before any cleanup — .gitignore eats *.log /
      #    test-results*.xml / Build/, so artifacts are the only way they survive.
      #    NOTE (ticket 86cadj4g7 #130 ROUND 6): this step runs BEFORE the gate steps
      #    (7/8/9), so it MUST NOT glob the gate logs (verify-pond.log /
      #    verify-settings.log) — they don't exist yet here, and globbing `ci-out/*.log`
      #    used to upload a STALE pond log from a prior warm-cache run, which a reviewer
      #    read as this PR's gate output (the false-green Tess caught). The gate logs are
      #    uploaded by their OWN post-gate steps below; this artifact carries only the
      #    bootstrap/editmode/build logs + the test XMLs. (playmode.log is NOT here post
      #    86cafz9tg split — PlayMode runs in its own `playmode` job which uploads its own
      #    log; globbing it from THIS build runner would only ever sweep a stale pre-split
      #    carry-over.)
      # RETENTION POLICY (86caj0ahr audit): EVERY upload-artifact step carries an EXPLICIT
      # retention-days — 3 for the Windows build artifact (the Sponsor soak-serving window;
      # it is ALSO the capture job's same-run download, so it must never drop below 1 day)
      # and 3 for capture/log evidence bundles (the PR review/QA window, weekend-inclusive;
      # was 14 — evidence is dead weight once the PR merges or re-pushes). Design rule:
      # retention must never strand an in-progress run's inter-job artifact — >=1 day
      # satisfies this; 3 keeps margin. New upload steps must set retention-days explicitly.
      - name: Upload test results + logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unity-ci-logs-${{ github.sha }}
          path: |
            ci-out/*.xml
            ci-out/bootstrap.log
            ci-out/editmode.log
            ci-out/build.log
          if-no-files-found: warn
          retention-days: 3

      # The capture job (different runner) DOWNLOADS this artifact to drive the
      # windowed gates against the SAME exe the build produced — the cross-runner
      # hand-off that makes the split work. retention-days: 3 (was 1 — 86caj0ahr):
      # this artifact IS the per-PR merge-ref soak build served to the Sponsor
      # ([[soak-build-stamp-is-merge-ref-not-headsha]]), and a soak often happens
      # 1-2 days after CI ran — at 1 day the soak exe could expire before it is
      # played. 3 covers the soak-serving window and stays >=1 day so the same-run
      # capture download is never stranded.
      - name: Upload Windows build
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: FarHorizon-Windows-${{ github.sha }}
          path: Build/Windows/**
          if-no-files-found: warn
          retention-days: 3

      # 6. Authoritative gates — run AFTER upload so evidence is preserved even
      #    when a gate fails. The XML parser and the log scanner (with the URP
      #    first-import warning allowlist) decide pass/fail, not the runner exit
      #    codes from steps 2/3.
      - name: Console-error gate (URP first-import warnings allowlisted)
        if: always()
        shell: bash
        run: |
          chmod +x .github/workflows/scripts/check_unity_log.sh
          .github/workflows/scripts/check_unity_log.sh \
            ci-out/bootstrap.log ci-out/editmode.log ci-out/build.log

      - name: EditMode result gate
        if: always()
        shell: bash
        run: python3 .github/workflows/scripts/parse_test_results.py ci-out/test-results-editmode.xml EditMode

      # NOTE: PlayMode result gating lives in the separate advisory `playmode` job
      # below — it is NOT part of this merge-gate job. (86caapwmt)

      - name: Build-result gate
        if: always()
        shell: bash
        run: |
          if grep -qE '\[FarHorizonBuilder\] result=Succeeded' ci-out/build.log; then
            grep -E '\[FarHorizonBuilder\] result=' ci-out/build.log
            echo "[build-gate] PASSED"
          else
            echo "[build-gate] FAILED — no 'result=Succeeded' line in build.log" >&2
            grep -E '\[FarHorizonBuilder\]' ci-out/build.log || true
            exit 1
          fi

      # CORRUPT-BUILD canary (ticket 86cagr0zu). The clean:false warm runner intermittently
      # ships a CORRUPT exe — a stale/partial Library/ScriptAssemblies from a concurrent/
      # cancelled prior build → Unity loads Boot.unity against a mismatched script layout and
      # emits SERIALIZATION-MISMATCH ("WasdMovement Read 84 expected 88") / MISSING-SCRIPT /
      # BROKEN-ASSEMBLY lines, shipping a build where WASD/NavMesh are INERT (observed #197 v5,
      # 2026-06-30). EditMode + peer review PASS on it (editor, fresh domain), and the
      # console-error gate deliberately fails only on `error CS`/`Compilation failed`/`Fatal`
      # — a serialization WARNING slips through. This scans the build-time logs for the
      # corruption signatures a healthy bootstrap+build never emits (a fresh bootstrap re-bakes
      # Boot.unity + recompiles, so a clean run never mismatches). Runs headlessly on ANY runner
      # BEFORE the expensive serial capture job, so a corrupt build fails RED + NAMED here rather
      # than as a "dismissed capture flake." id: used by the heal step below.
      - name: Corrupt-build canary (stale-Library / serialization-mismatch)
        id: corrupt_canary
        if: always()
        shell: bash
        run: |
          chmod +x .github/workflows/scripts/check_corrupt_build.sh
          .github/workflows/scripts/check_corrupt_build.sh \
            ci-out/bootstrap.log ci-out/editmode.log ci-out/build.log

      # HEAL on detection (ticket 86cagr0zu — prevent, without blanket clean:true). When the
      # canary fired, the warm runner's Library/ScriptAssemblies is stale/partial and a bare
      # re-run would keep failing (warm-cache mtime skips the recompile). Delete ONLY the
      # regenerable compiled-script + Bee build caches so the NEXT run recompiles fresh and
      # HEALS, while Library/PackageCache stays WARM (the clean:false win). This run is already
      # RED (the canary failed) — this is best-effort recovery for the re-run, never a gate.
      - name: Heal warm runner on corrupt build (targeted ScriptAssemblies clean)
        if: ${{ always() && steps.corrupt_canary.outcome == 'failure' }}
        shell: bash
        run: |
          chmod +x .github/workflows/scripts/clean_scriptassemblies.sh
          .github/workflows/scripts/clean_scriptassemblies.sh "$GITHUB_WORKSPACE"

  # ---------------------------------------------------------------------------
  # Capture gate — self-hosted Windows runner PINNED to runner-1 via the EXTRA
  # `capture` label. The WINDOWED-CAPTURE half of the old `unity` job (split in
  # 86cafz9tg). DOWNLOADS the build artifact (a different runner produced it) and
  # drives the shipped-build capture gates against the SAME exe: generic spawn,
  # settings panel, freshwater pond, loot prompt, water acquisition, chop→pile→loot.
  #
  # PINNED + SERIAL — the two safety pins that keep captures clean:
  #   * runs-on includes the EXTRA `capture` label → only runner-1 (which carries
  #     it) is eligible; runner-2 (no `capture` label) can NEVER pick this up. So a
  #     windowed capture never lands on a runner that might be mid-build.
  #   * concurrency: group: unity-capture (ABSOLUTE — NO ref suffix) → at most ONE
  #     capture job runs at a time across the WHOLE repo, even across different PRs.
  #     This is the A/B-proven safety pin (2026-06-29: 4/4 clean single-runner vs
  #     3/3 flaked with runner-2 online — the D3D12 first-frame present loop wedges
  #     under concurrent-build contention). cancel-in-progress: false so a queued
  #     capture is never DROPPED (its required-gate verdict must always be produced).
  #
  # needs: build → only runs after the build is green + the artifact exists.
  # if: always() so a capture still runs (and can FAIL the merge) even if a later
  # build-job gate step went red — the capture verdict is REQUIRED, not optional.
  # No bootstrap / no Unity build here: this job launches the prebuilt exe only, so
  # it has no PackageCache contention of its own.
  # ---------------------------------------------------------------------------
  capture:
    name: capture (self-hosted runner-1, windowed gates)
    runs-on: [self-hosted, windows, unity, capture]
    needs: build
    if: always()
    timeout-minutes: 45
    concurrency:
      group: unity-capture
      cancel-in-progress: false
    env:
      RESULTS: ${{ github.workspace }}\ci-out
    steps:
      # The capture scripts (capture_gate.sh, verify_*_gate.sh, frame_check.py) live
      # in the repo, so the capture runner needs its own checkout. clean:false keeps
      # parity with the build/playmode jobs (harmless here — no Library is used).
      - uses: actions/checkout@v4
        with:
          clean: false

      - name: Prepare output dir
        shell: bash
        run: mkdir -p ci-out

      # Stale-evidence hygiene (same rationale as the build job's step 0a — with
      # clean:false the gitignored ci-out/ persists between runs on the warm runner,
      # so a PRIOR run's gate logs/captures could be read as THIS run's output).
      # Delete last run's capture logs + frame dirs at job START so every uploaded
      # artifact reflects ONLY this run.
      - name: Clean stale gate outputs (prevent stale-log false-green)
        shell: bash
        run: |
          rm -f ci-out/verify-pond.log ci-out/verify-settings.log ci-out/verify-loot.log \
                ci-out/verify-water.log ci-out/verify-chop.log ci-out/capture.log \
                ci-out/verify-heldbelt.log ci-out/verify-sky.log ci-out/verify-invdragghostpos.log
          rm -rf ci-out/caps ci-out/settings-caps ci-out/pond-caps \
                 ci-out/loot-caps ci-out/water-caps ci-out/chop-caps \
                 ci-out/heldbelt-caps ci-out/sky-caps ci-out/invdragghost-caps

      # Pull the exe the BUILD job produced (it ran on a possibly-different runner).
      # The capture gates launch Build/Windows/FarHorizon.exe; download-artifact
      # restores it to that path under the workspace.
      - name: Download Windows build artifact
        uses: actions/download-artifact@v4
        with:
          name: FarHorizon-Windows-${{ github.sha }}
          path: Build/Windows

      # 7. Shipped-build capture gate (ticket 86ca86g7k) — the editor-vs-runtime
      #    backstop. Launches the BUILT exe WINDOWED (NOT -batchmode: ScreenCapture
      #    needs a real swapchain, spike iter-4 / unity-conventions.md), drives the
      #    standard CaptureGate component for N frames, then frame_check.py FAILS on
      #    black/empty/uniform/magenta frames. Runs only when the build produced an
      #    exe; the frames upload AFTER (if: always()) so evidence survives a fail.
      - name: Shipped-build capture gate (frame content)
        if: always()
        shell: bash
        run: |
          if [ -f Build/Windows/FarHorizon.exe ]; then
            chmod +x .github/workflows/scripts/capture_gate.sh
            .github/workflows/scripts/capture_gate.sh \
              Build/Windows/FarHorizon.exe ci-out/caps 4
          else
            echo "[capture-gate] no exe at Build/Windows/FarHorizon.exe — build produced no binary" >&2
            exit 1
          fi

      - name: Upload capture frames
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: FarHorizon-captures-${{ github.sha }}
          path: ci-out/caps/*.png
          if-no-files-found: warn
          retention-days: 3

      # CORRUPT-BUILD canary — RUNTIME player log (ticket 86cagr0zu). The generic capture
      # gate above launches the SHIPPED exe (-logFile ci-out/capture.log), so this is the
      # earliest point the built exe's OWN runtime log exists. A warm-runner corrupt build's
      # serialization-mismatch / missing-script lines surface HERE at scene-load even when the
      # spawn frame still rendered (a static scene can render while WASD/NavMesh are inert) —
      # so frame_check alone is NOT sufficient. Scanning the runtime log NAMES a corrupt build
      # ("re-run clean") instead of letting a red capture gate be dismissed as a launch flake
      # (the exact #197 v5 mis-triage). if: always() so it runs even when the capture gate went
      # red; it re-uses the SAME detector as the build job. (The targeted heal lives in the
      # build job — the corrupt Library is on the BUILD runner, which may differ from this
      # runner-1 capture runner, so cleaning here would miss it.)
      - name: Corrupt-build canary (runtime player log)
        if: always()
        shell: bash
        run: |
          chmod +x .github/workflows/scripts/check_corrupt_build.sh
          .github/workflows/scripts/check_corrupt_build.sh ci-out/capture.log

      # 8. Settings-panel shipped-build capture gate (ticket 86caa4bqp) — the
      #    panel-specific sibling of step 7. The generic -captureGate renders a
      #    closed-world gameplay frame with NO panel, so it can never satisfy the
      #    settings success-test ("panel OPENS + a tweak TAKES EFFECT LIVE" — Tess
      #    QA bounce on PR #83). This launches the SAME built exe windowed with
      #    -verifySettings, driving SettingsVerifyCapture to open the panel + drag
      #    the walk-speed slider to max. It then asserts BOTH: (a) frame_check.py on
      #    settings_{closed,open,tweaked}.png (the panel really rendered in the
      #    shipped player), and (b) the player log carries `changedLive=True` (the
      #    live param actually changed — the end-to-end "tweak takes effect" proof).
      #    Runs only when the build produced an exe; frames + log upload AFTER
      #    (if: always()) so the panel evidence survives a fail.
      - name: Settings-panel capture gate (panel opens + live tweak)
        if: always()
        shell: bash
        run: |
          if [ -f Build/Windows/FarHorizon.exe ]; then
            chmod +x .github/workflows/scripts/verify_settings_gate.sh
            .github/workflows/scripts/verify_settings_gate.sh \
              Build/Windows/FarHorizon.exe ci-out/settings-caps ci-out/verify-settings.log
          else
            echo "[verify-settings] no exe at Build/Windows/FarHorizon.exe — build produced no binary" >&2
            exit 1
          fi

      - name: Upload settings-panel frames + log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: FarHorizon-settings-caps-${{ github.sha }}
          path: |
            ci-out/settings-caps/*.png
            ci-out/verify-settings.log
          if-no-files-found: warn
          retention-days: 3

      # 9. Freshwater-pond shipped-build capture gate (ticket 86caamkv7 follow-up, re-wired
      #    in 86cadj4g7 — removed from #129 in ead2bd5 when it was RED on a pre-existing
      #    pond-render defect, now re-added GREEN after that defect was fixed). The thirst
      #    DRINK source: #124 verified the need model + drink-action headlessly, but the pond's
      #    SHIPPED render (does it read FRESH-BLUE + visible in the built exe?) was never gated —
      #    the generic -captureGate (step 7) only sanity-checks the spawn frame, it never frames
      #    the pond. This launches the SAME built exe windowed with -verifyPond, driving
      #    FreshwaterPondVerifyCapture to frame the gameplay-pitch orbit cam onto the pond at
      #    three yaws (pond_a/b/c.png) and SELF-ASSERT the perceptual fresh-blue read (centre
      #    B > G — the freshwater tell; the sea's teal never passes) + visible. The component
      #    Quit(1)s if the pond is not fresh-blue/visible (or missing from Boot.unity), so the
      #    exe's exit code IS the gate verdict; frame_check.py is a swapchain-content backstop.
      #    Runs only when the build produced an exe; frames + log upload AFTER (if: always()) so
      #    the pond evidence survives a fail.
      - name: Freshwater-pond capture gate (pond reads fresh-blue + visible)
        if: always()
        shell: bash
        run: |
          if [ -f Build/Windows/FarHorizon.exe ]; then
            chmod +x .github/workflows/scripts/verify_pond_gate.sh
            .github/workflows/scripts/verify_pond_gate.sh \
              Build/Windows/FarHorizon.exe ci-out/pond-caps ci-out/verify-pond.log
          else
            echo "[verify-pond] no exe at Build/Windows/FarHorizon.exe — build produced no binary" >&2
            exit 1
          fi

      - name: Upload freshwater-pond frames + log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: FarHorizon-pond-caps-${{ github.sha }}
          path: |
            ci-out/pond-caps/*.png
            ci-out/verify-pond.log
          if-no-files-found: warn
          retention-days: 3

      # 10. Loot-prompt shipped-build capture gate (ticket 86cafc6ud — Tess QA #158 block,
      #     comment 4825495098). The loot-proximity prompt ("Press E to pick up berries") is
      #     the deliverable of 86cafc6ud, but the generic -captureGate (step 7) only shoots the
      #     DEFAULT SPAWN frame — where the player stands mid-field, OUTSIDE the tightened
      #     ~1.0–1.2u loot range, so the prompt is correctly HIDDEN → the prompt's SHOW state
      #     had ZERO built-frame evidence (Tess: editor-vs-runtime divergence is a proven failure
      #     class — IMGUI green in EditMode ≠ legible in the IL2CPP frame). This launches the SAME
      #     built exe windowed with -verifyLoot, driving LootPromptVerifyCapture to teleport the
      #     player IN loot range of a ripe bush so LootPrompt renders the tooltip, then SELF-ASSERT
      #     the LOGIC (NearestInRange resolves the bush + the label is set) AND the RENDER (the IMGUI
      #     plate+label actually painted into the frame). The component Quit(1)s on either failure
      #     (or missing wiring), so the exe's exit code IS the gate verdict; frame_check.py is a
      #     swapchain-content backstop. Runs only when the build produced an exe; frames + log upload
      #     AFTER (if: always()) so the prompt evidence survives a fail.
      - name: Loot-prompt capture gate (prompt shows + renders in range)
        if: always()
        shell: bash
        run: |
          if [ -f Build/Windows/FarHorizon.exe ]; then
            chmod +x .github/workflows/scripts/verify_loot_gate.sh
            .github/workflows/scripts/verify_loot_gate.sh \
              Build/Windows/FarHorizon.exe ci-out/loot-caps ci-out/verify-loot.log
          else
            echo "[verify-loot] no exe at Build/Windows/FarHorizon.exe — build produced no binary" >&2
            exit 1
          fi

      - name: Upload loot-prompt frames + log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: FarHorizon-loot-caps-${{ github.sha }}
          path: |
            ci-out/loot-caps/*.png
            ci-out/verify-loot.log
          if-no-files-found: warn
          # Was the ONE upload step with NO explicit retention-days (86caj0ahr audit) —
          # it silently rode the repo default (90 days). Now pinned like its siblings.
          retention-days: 3

      # WATER-ACQUISITION capture gate (ticket 86cafc6vx AC6 — the GET side that closes the thirst loop).
      #     The generic -captureGate (step 7) only shoots the DEFAULT SPAWN frame — the player stands
      #     mid-field, OUTSIDE the pond's loot range, so the "Press E to collect water" prompt is HIDDEN
      #     and NO loot/drink beat fires → the one surface this ticket delivers (collect water at the pond
      #     + drink it → thirst rises) had ZERO built-frame evidence (editor-vs-runtime divergence is a
      #     proven failure class). This launches the SAME built exe windowed with -verifyWater, driving
      #     WaterAcquisitionVerifyCapture: teleport the player IN the pond's loot range (agent.Warp — NOT
      #     MoveTo, DEAD under WASD) so LootPrompt paints "Press E to collect water", then RequestLoot →
      #     one water in the inventory, then select + RequestUseClick → thirst RISES; SELF-ASSERT all four
      #     beats (prompt show + render, the E-loot, the drink). The component Quit(1)s on any failure (or
      #     missing wiring), so the exe's exit code IS the gate verdict; frame_check.py is a swapchain
      #     backstop. Runs only when the build produced an exe; frames + log upload AFTER (if: always()).
      - name: Water-acquisition capture gate (collect water + drink raises thirst)
        if: always()
        shell: bash
        run: |
          if [ -f Build/Windows/FarHorizon.exe ]; then
            chmod +x .github/workflows/scripts/verify_water_gate.sh
            .github/workflows/scripts/verify_water_gate.sh \
              Build/Windows/FarHorizon.exe ci-out/water-caps ci-out/verify-water.log
          else
            echo "[verify-water] no exe at Build/Windows/FarHorizon.exe — build produced no binary" >&2
            exit 1
          fi

      - name: Upload water-acquisition frames + log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: FarHorizon-water-caps-${{ github.sha }}
          path: |
            ci-out/water-caps/*.png
            ci-out/verify-water.log
          if-no-files-found: warn
          retention-days: 3

      # 11. Chop → pile → E-loot shipped-build capture gate (ticket 86cafecuj — PR #165
      #     review gap, Drew comment 4826621229). Tree-chop AC8 requires a SHIPPED-BUILD
      #     capture proving fell → pile spawns → E loots it → wood in inventory, and that
      #     proof IS implemented in -verifyChop (ChopVerifyCapture drives the REAL
      #     PickableLooter discovery path at ChopVerifyCapture.cs:114-115). BUT -verifyChop
      #     was NEVER a CI gate (grep -rn verifyChop .github/workflows/ → zero hits), so a
      #     real break in the chop→pile→E-loot path slipped straight through GREEN CI: PR
      #     #165's first push (bbac84f) had a LogPile the live looter never discovered (the
      #     pile is never registered; PickableLooter.EnsureDiscovered only re-scans when
      #     _pickables.Count==0, but a serialized pickable keeps it >0) — CI was green anyway
      #     because the generic -captureGate (step 7) only shoots the spawn frame AND the
      #     tests masked it (ChopTreePlayModeTests hand-called DiscoverPickables; LogPileTests
      #     bypass the looter). Caught only by code review. This launches the SAME built exe
      #     windowed with -verifyChop, driving ChopVerifyCapture to craft the axe, FELL the
      #     demo tree + LOOT its dropped pile via the real PickableLooter.RequestLoot path,
      #     then fell + loot a REAL seed-42 SCATTER tree for a 2nd INDEPENDENT wood gain, and
      #     SELF-ASSERT demoWood && scatterDiscovered && scatterTarget && scatterWood. The
      #     component Quit(1)s on any failure (or missing wiring), so the exe's exit code IS
      #     the gate verdict; frame_check.py is a swapchain-content backstop. Runs only when
      #     the build produced an exe; frames + log upload AFTER (if: always()) so the chop
      #     evidence survives a fail.
      - name: Chop capture gate (fell → pile → E-loot → wood in inventory)
        if: always()
        shell: bash
        run: |
          if [ -f Build/Windows/FarHorizon.exe ]; then
            chmod +x .github/workflows/scripts/verify_chop_gate.sh
            .github/workflows/scripts/verify_chop_gate.sh \
              Build/Windows/FarHorizon.exe ci-out/chop-caps ci-out/verify-chop.log
          else
            echo "[verify-chop] no exe at Build/Windows/FarHorizon.exe — build produced no binary" >&2
            exit 1
          fi

      - name: Upload chop frames + log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: FarHorizon-chop-caps-${{ github.sha }}
          path: |
            ci-out/chop-caps/*.png
            ci-out/verify-chop.log
          if-no-files-found: warn
          retention-days: 3

      # 12. Held-belt-selection shipped-build capture gate (ticket 86cahx2p5 — the CI wiring
      #     follow-up to PR #232 / 86cahngdg, the soak-224 crossed-visual fix). The belt-selection
      #     table ("the held visual follows the SELECTED belt weapon": axe -> AXE mesh, spear ->
      #     SPEAR mesh, empty -> hidden, back-to-axe -> the mesh RETURNS, never the stale spear)
      #     was proven by PlayMode tests + a manual soak only — the generic -captureGate (step 7)
      #     shoots the default spawn frame with NO weapons acquired, so a re-break of the selection
      #     sync would slip through GREEN CI exactly like the #165 chop class. This launches the
      #     SAME built exe windowed with -verifyHeldBelt, driving AxeVerifyCapture's held-belt path:
      #     acquire axe + spear via the REAL Inventory pickup seams, drive all four selection states,
      #     SELF-ASSERT renderer visibility + held-mesh identity per state (vertex-count swap proof).
      #     The component Quit(1)s on any failed state (or missing wiring), so the exe's exit code IS
      #     the gate verdict; frame_check.py is a swapchain-content backstop. STATE-4 writes no PNG
      #     yet (needs a runtime change — remaining scope on 86cahx2p5); its assert rides the exit
      #     code. Runs only when the build produced an exe; frames + log upload AFTER (if: always()).
      - name: Held-belt capture gate (held visual follows belt selection)
        if: always()
        shell: bash
        run: |
          if [ -f Build/Windows/FarHorizon.exe ]; then
            chmod +x .github/workflows/scripts/verify_heldbelt_gate.sh
            .github/workflows/scripts/verify_heldbelt_gate.sh \
              Build/Windows/FarHorizon.exe ci-out/heldbelt-caps ci-out/verify-heldbelt.log
          else
            echo "[verify-heldbelt] no exe at Build/Windows/FarHorizon.exe — build produced no binary" >&2
            exit 1
          fi

      - name: Upload held-belt frames + log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: FarHorizon-heldbelt-caps-${{ github.sha }}
          path: |
            ci-out/heldbelt-caps/*.png
            ci-out/verify-heldbelt.log
          if-no-files-found: warn
          retention-days: 3

      # 13. Sky-facing (sun-disk + cloud-contrast) shipped-build capture gate (ticket 86cag1xn0 —
      #     the #194 follow-up that makes the existing verify_sky_gate.sh an actual CI gate; the
      #     script + SkyVerifyCapture landed with the sun-disk POC but were never invoked here, so
      #     the sun-disk/cloud-contrast read had NO recurring built-frame gate). The generic
      #     -captureGate (step 7) frames the spawn looking DOWN over the shoulder — it never tilts
      #     up to the sky. This launches the SAME built exe windowed with -verifySky, driving
      #     SkyVerifyCapture: park a dedicated sky camera, aim at the LIVE Sun (sky_sun.png) + up
      #     into the cloud band (sky_clouds.png) + a gameplay-framed shot, and SELF-ASSERT (1) SUN
      #     VISIBLE (centre brighter + warmer than the blue surround) and (2) CLOUD-VS-SKY CONTRAST
      #     (a non-trivial pixel fraction well above the sky median luma). The component Quit(1)s
      #     on either failure (or a missing Sun), so the exe's exit code IS the gate verdict;
      #     frame_check.py is a swapchain-content backstop. Runs only when the build produced an
      #     exe; frames + log upload AFTER (if: always()) so the sky evidence survives a fail.
      - name: Sky capture gate (sun disk visible + cloud contrast)
        if: always()
        shell: bash
        run: |
          if [ -f Build/Windows/FarHorizon.exe ]; then
            chmod +x .github/workflows/scripts/verify_sky_gate.sh
            .github/workflows/scripts/verify_sky_gate.sh \
              Build/Windows/FarHorizon.exe ci-out/sky-caps ci-out/verify-sky.log
          else
            echo "[verify-sky] no exe at Build/Windows/FarHorizon.exe — build produced no binary" >&2
            exit 1
          fi

      - name: Upload sky frames + log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: FarHorizon-sky-caps-${{ github.sha }}
          path: |
            ci-out/sky-caps/*.png
            ci-out/verify-sky.log
          if-no-files-found: warn
          retention-days: 3

      # 14. Inventory drag-ghost-position shipped-build capture gate at 2560x1440 (ticket
      #     86cafhgun — promotes the 86caffw9h -verifyInvDragGhostPos probe to a REQUIRED gate).
      #     The bug class ("the dragged bag item suddenly displays in a different position"): the
      #     ghost positioning must apply the ScaleWithScreenSize panel SCALE; a scale-less
      #     regression is INVISIBLE at exactly 1920x1080 (panel scale ~= 1) — so this gate runs the
      #     exe at an EXPLICIT NON-1080p size (2560x1440, load-bearing) and the probe SELF-GUARDS
      #     it (Quit(3) if the panel scale reads ~1, so a silently-clamped window FAILS rather than
      #     false-greens). Drives InventoryDragGhostPosVerifyCapture: open the pack with berries,
      #     BEGIN a real drag, let the production cursor-driven path position the ghost, then
      #     SELF-ASSERT ghost-center == expected panel point for the live cursor (tol 2 panel px;
      #     Quit(5) on divergence — the real regression). The exe's exit code IS the gate verdict;
      #     frame_check.py is a swapchain backstop on inv_drag_ghost_pos.png. Runs only when the
      #     build produced an exe; frame + log upload AFTER (if: always()).
      - name: Inv drag-ghost-position capture gate (2560x1440, ghost rides the cursor)
        if: always()
        shell: bash
        run: |
          if [ -f Build/Windows/FarHorizon.exe ]; then
            chmod +x .github/workflows/scripts/verify_invdragghostpos_gate.sh
            .github/workflows/scripts/verify_invdragghostpos_gate.sh \
              Build/Windows/FarHorizon.exe ci-out/invdragghost-caps ci-out/verify-invdragghostpos.log
          else
            echo "[verify-invdragghostpos] no exe at Build/Windows/FarHorizon.exe — build produced no binary" >&2
            exit 1
          fi

      - name: Upload inv drag-ghost frame + log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: FarHorizon-invdragghost-caps-${{ github.sha }}
          path: |
            ci-out/invdragghost-caps/*.png
            ci-out/verify-invdragghostpos.log
          if-no-files-found: warn
          retention-days: 3

  # ---------------------------------------------------------------------------
  # PlayMode gate — ADVISORY, NON-REQUIRED, FAIL-FAST. Runs the PlayMode suite for
  # signal, but can NEVER block a merge:
  #   * `continue-on-error: true` at the JOB level → a failed/timed-out PlayMode
  #     run reports the job result as a (neutral) non-failure to the workflow, so
  #     branch protection (which gates on `structure` + `build` + `capture`)
  #     is unaffected. Do NOT add this job's check to required status checks.
  #   * `timeout-minutes: 5` (was 20 — 86cae8vn2) is a HARD cap: a FUTURE play-mode-ENTER
  #     env-deadlock fails FAST + NAMED (this job goes red, clearly attributable to PlayMode)
  #     instead of hanging to the 90-min job cap and crashing the runner. Tightened 20→5
  #     because a hung play-mode-enter pins a self-hosted runner for the full cap,
  #     wedging the NEXT push's `build` merge-gate (per-runner PackageCache cap); 5 min
  #     still lets play-mode-enter START + confirm the deadlock, then frees the runner ~15 min
  #     sooner. Re-fold + re-tighten when the deadlock root cause lands (86cab7u42).
  #   * `needs: build` (was `needs: unity` pre-86cafz9tg) gates this AFTER the build job
  #     completes. NOTE: `needs: build` alone does NOT prevent PlayMode from overlapping
  #     the `capture` job — both gate only on `build`, so after build they are eligible
  #     SIMULTANEOUSLY (the 86cafz9tg-split regression codereview 4841684229 caught). The
  #     no-overlap-with-capture invariant (PR #80's serialization, which `needs: unity`
  #     used to provide) is now enforced by the SHARED `unity-capture` concurrency group
  #     below — at most ONE of {capture, playmode} runs at a time across the whole repo,
  #     so PlayMode's Unity invocation can never contend a windowed capture (the D3D12
  #     first-frame present loop #190 A/B-CONFIRMED wedges under concurrent-build
  #     contention) NOR a same-runner PackageCache rename
  #     ([[single-unity-build-slot-serializes-orchestration]] +
  #     unity-conventions.md §Process notes). `if: always()` lets PlayMode run for
  #     signal even when the build job failed.
  #   * `concurrency: group: unity-capture` (ABSOLUTE — shared with the `capture` job)
  #     serializes playmode-vs-capture (never concurrent) WITHOUT making playmode depend
  #     on capture's SUCCESS — so it stays advisory + adds no sequential latency on the
  #     success path.
  #
  # The play-mode-ENTER deadlock is ENVIRONMENTAL + fixture-presence-triggered (it
  # fires before any single fixture runs; EditMode is unaffected; the same PlayMode
  # pattern passed on green main run 27685445841). When the root cause is fixed,
  # re-fold PlayMode into the blocking `build` gate + drop this job.
  # Re-enable-blocking follow-up: ticket 86cab7u42 (this PR: 86caapwmt).
  # ---------------------------------------------------------------------------
  playmode:
    name: playmode (self-hosted, advisory — non-blocking)
    runs-on: [self-hosted, windows, unity]
    needs: build
    if: always()
    # SHARE the `capture` job's ABSOLUTE concurrency group so PlayMode can NEVER run
    # CONCURRENTLY with a windowed capture (86cafz9tg review, codereview 4841684229 —
    # restores PR #80's serialization invariant the 86cafz9tg split broke). Both
    # `capture` and `playmode` gate only on `build`, so after build they would otherwise
    # be eligible SIMULTANEOUSLY — and `playmode` (no `capture` label) could land on
    # runner-2 while `capture` runs its windowed gates on runner-1 = the exact
    # 2-concurrent-Unity contention #190 A/B-CONFIRMED wedges the D3D12 first-frame
    # present loop. Sharing `unity-capture` (no ref suffix) makes at most ONE of
    # {capture, playmode} run at a time across the WHOLE repo. This is STRICTLY
    # no-overlap serialization — it does NOT make playmode depend on capture's SUCCESS
    # (that would be `needs: [build, capture]`, forcing playmode to wait for capture
    # every run); playmode stays advisory + adds no sequential latency on the success
    # path (it just can't be co-scheduled with a capture). cancel-in-progress: false so
    # neither a queued capture nor a queued playmode is ever DROPPED.
    concurrency:
      group: unity-capture
      cancel-in-progress: false
    continue-on-error: true   # ADVISORY — PlayMode can NEVER block a merge (86caapwmt)
    # 20→5 (86cae8vn2): a hung play-mode-enter pins a self-hosted runner for the
    # full cap, wedging the NEXT push's `build` merge-gate (per-runner PackageCache cap).
    # 5 min still lets play-mode-enter START + confirm the deadlock fast, then frees the
    # runner ~15 min sooner. Re-fold + re-tighten when the deadlock root cause lands (86cab7u42).
    timeout-minutes: 5        # HARD fail-fast cap: a play-mode-enter deadlock fails FAST + NAMED
    env:
      UNITY: 'C:\Program Files\Unity\Hub\Editor\6000.4.11f1\Editor\Unity.exe'
      RESULTS: ${{ github.workspace }}\ci-out
    steps:
      - uses: actions/checkout@v4
        with:
          clean: false

      - name: Prepare output dir
        shell: bash
        run: mkdir -p ci-out

      - name: Clean stranded PackageCache .tmp dirs
        shell: bash
        run: |
          chmod +x .github/workflows/scripts/clean_packagecache_tmp.sh
          .github/workflows/scripts/clean_packagecache_tmp.sh

      - name: Bootstrap project (BootstrapProject.Run)
        shell: bash
        run: |
          chmod +x .github/workflows/scripts/bootstrap_with_retry.sh
          .github/workflows/scripts/bootstrap_with_retry.sh \
            "$UNITY" "$GITHUB_WORKSPACE" "ci-out/bootstrap.log"

      # PlayMode tests. NO -quit with -runTests (unity-conventions.md). Headless:
      # Time.deltaTime~0 per frame — the suite samples over a Time.time window. If
      # the play-mode-ENTER env-deadlock fires, the job's timeout-minutes cap kills
      # it FAST + NAMED rather than hanging the pipeline.
      - name: PlayMode tests
        shell: cmd
        run: >
          "%UNITY%" -batchmode -nographics
          -projectPath "%GITHUB_WORKSPACE%"
          -runTests -testPlatform PlayMode
          -testResults "%RESULTS%\test-results-playmode.xml"
          -logFile "%RESULTS%\playmode.log"
        continue-on-error: true

      - name: Upload PlayMode results + log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: FarHorizon-playmode-${{ github.sha }}
          path: |
            ci-out/test-results-playmode.xml
            ci-out/playmode.log
          if-no-files-found: warn
          retention-days: 3

      # Advisory result gate — reports PlayMode pass/fail for SIGNAL. The job-level
      # continue-on-error keeps a red here from ever blocking a merge.
      - name: PlayMode result gate (advisory)
        if: always()
        shell: bash
        run: |
          if [ ! -f ci-out/test-results-playmode.xml ]; then
            echo "[PlayMode] no result XML — PlayMode likely hung on play-mode-ENTER (env-deadlock) and was killed by the job timeout. ADVISORY only; does not block merge. Tracked: 86caapwmt." >&2
            exit 1
          fi
          python3 .github/workflows/scripts/parse_test_results.py ci-out/test-results-playmode.xml PlayMode
